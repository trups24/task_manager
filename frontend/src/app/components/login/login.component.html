<div class="login-container">
  <div class="login-card-glass">
    <div class="login-header-glass">
      <i class="bi bi-kanban-fill" style="font-size: 3rem; color: #6366f1; margin-bottom: 1rem; display: block;"></i>
      <h2>Welcome Back</h2>
      <p class="text-muted">Sign in to manage your tasks</p>
    </div>

    <div class="login-body">
      <form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()">
        <div class="mb-3">
          <label class="form-label fw-bold small text-uppercase">Email Address</label>
          <div class="input-group">
            <span class="input-group-text border-0 bg-transparent text-muted"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control glass-form-control" formControlName="email" placeholder="name@company.com">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold small text-uppercase">Password</label>
          <div class="input-group">
            <span class="input-group-text border-0 bg-transparent text-muted"><i class="bi bi-shield-lock"></i></span>
            <input type="password" class="form-control glass-form-control" formControlName="password" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="btn-login-glass" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          Sign In
        </button>
      </form>
    </div>
  </div>

  <div *ngIf="loading" class="loading-overlay">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</div>
